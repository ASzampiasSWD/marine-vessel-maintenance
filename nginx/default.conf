# put this in the /etc/nginx/conf.d/default.conf directory. 
# use pm2 to host node server. nginx acts as back-end pm2 start index.js
upstream nodejs_app {
    server 127.0.0.1:3000;
    keepalive 64;
}
# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name boatrepair.work  www.boatrepair.work;
    return 301 https://$server_name$request_uri;
}
server {
    listen 443 ssl;
    http2 on;
    server_name boatrepair.work www.boatrepair.work;
    # SSL certificates
    ssl_certificate /etc/letsencrypt/live/boatrepair.work/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/boatrepair.work/privkey.pem;
    # SSL settings
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;
    # Modern SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    # HSTS
    add_header Strict-Transport-Security "max-age=63072000" always;
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        root /home/ec2-user/boat/public;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        #Fallback to Node.js if file not found
        #try_files $uri @nodejs;
    }
    location / {
        proxy_pass http://nodejs_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}